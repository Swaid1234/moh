<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور والانصراف الذكي الفوري</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            transition: background 0.3s ease;
            font-weight: bold;
        }
        .btn-attendance {
            background-color: #2ecc71;
        }
        .btn-attendance:hover {
            background-color: #27ae60;
        }
        .btn-departure {
            background-color: #e67e22;
        }
        .btn-departure:hover {
            background-color: #d35400;
        }
        #status-message {
            margin-top: 20px;
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
            min-height: 24px;
        }
        .loading {
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>بوابة الحضور والانصراف</h2>
    <p>اضغط على الزر المطلوب لمرة واحدة وسيتم التحقق والتوجيه تلقائياً:</p>
    
    <div class="btn-group">
        <button class="btn btn-attendance" onclick="processCheck('attendance')">تسجيل حضور</button>
        <button class="btn btn-departure" onclick="processCheck('departure')">تسجيل انصراف</button>
    </div>
    
    <div id="status-message"></div>
</div>

<script>
     // ========================================================
    // 1. إعدادات المواقع اليدوية (ضع إحداثياتك هنا)
    // ========================================================
    const LOCATIONS = [
        { name: "الموقع الأول", lat: 21.41619632962374, lng:39.88574198075799 }, 
        { name: "الموقع الثاني", lat: 21.338251, lng:39.994099  }   
    ];

    const ALLOWED_RADIUS = 3000; // المسافة المسموحة بالمتر

    // ========================================================
    // 2. روابط قوقل فورم (استبدل الروابط الوهمية بروابطك الفعالة)
    // ========================================================
    const ATTENDANCE_FORM_URL = "https://forms.gle/6pUtD5bcLRYJV18Z8";
    const DEPARTURE_FORM_URL = "https://forms.gle/Hn2ysDaE5TP6pwn17";
    // ========================================================
    const statusDiv = document.getElementById('status-message');

    // الدالة الرئيسية التي تنطلق بضغطة زر واحدة فقط
    function processCheck(action) {
        if (!navigator.geolocation) {
            statusDiv.style.color = "#e74c3c";
            statusDiv.innerHTML = "متصفحك لا يدعم خاصية تحديد الموقع الجغرافي.";
            return;
        }

        statusDiv.className = "loading";
        statusDiv.innerHTML = "جاري تحديد موقعك والتحقق تلقائياً... انتظر ثواني.";

        // طلب الموقع مباشرة من الـ GPS وتمرير نوع العملية (حضور/انصراف) فوراً للخطوة التالية
        navigator.geolocation.getCurrentPosition(
            function(position) {
                // في حال نجاح المتصفح في جلب الموقع:
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;
                let insideAnyLocation = false;
                let detectedLocationName = "";

                // فحص المطابقة مع المواقع
                for (let i = 0; i < LOCATIONS.length; i++) {
                    const distance = calculateDistance(userLat, userLng, LOCATIONS[i].lat, LOCATIONS[i].lng);
                    if (distance <= ALLOWED_RADIUS) {
                        insideAnyLocation = true;
                        detectedLocationName = LOCATIONS[i].name;
                        break; 
                    }
                }

                if (insideAnyLocation) {
                    statusDiv.className = "";
                    statusDiv.style.color = "#27ae60";
                    statusDiv.innerHTML = `تم التحقق بنجاح في [${detectedLocationName}]! جاري التوجيه فوراً...`;
                    
                    // التوجيه التلقائي المباشر دون أي توقف أو نوافذ
                    if (action === 'attendance') {
                        window.location.replace(ATTENDANCE_FORM_URL);
                    } else if (action === 'departure') {
                        window.location.replace(DEPARTURE_FORM_URL);
                    }
                } else {
                    statusDiv.className = "";
                    statusDiv.style.color = "#e74c3c";
                    statusDiv.innerHTML = "عذراً، أنت خارج نطاق النطاق المسموح به للعمل.";
                }
            }, 
            function(error) {
                // في حال حدوث خطأ أو رفض الإذن
                statusDiv.className = "";
                statusDiv.style.color = "#e74c3c";
                if (error.code === error.PERMISSION_DENIED) {
                    statusDiv.innerHTML = "يرجى إعطاء صلاحية الـ GPS للمتصفح لتتمكن من التسجيل.";
                } else {
                    statusDiv.innerHTML = "فشل تحديد موقعك، تأكد من تفعيل الـ GPS في جهازك.";
                }
            }, 
            {
                enableHighAccuracy: true, // إجبار الجهاز على استخدام الـ GPS الفعلي لأعلى دقة
                timeout: 8000,
                maximumAge: 0
            }
        );
    }

    // دالة حساب المسافة بالمتر (Haversine Formula)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c; 
    }
</script>

</body>
</html>
