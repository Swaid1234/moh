<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام الحضور والانصراف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --card-bg: rgba(10, 10, 10, 0.75);
      --success: #2ecc71;
      --danger: #e74c3c;
      --radius: 18px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
      position: relative;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-image: url('YOUR_BACKGROUND_IMAGE.jpg'); /* ← ضع رابط صورتك هنا */
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .header { text-align: center; }
    .header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(201,168,76,0.5);
    }
    #clock {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .cards {
      display: flex;
      gap: 20px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      flex: 1 1 240px;
      max-width: 300px;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: transform .28s, box-shadow .28s, border-color .28s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.12), transparent 70%);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--gold);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(201,168,76,0.2);
    }
    .card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }
    .card:active { transform: scale(0.97); }
    .card-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
    .card-title { font-size: 1.35rem; font-weight: 700; color: var(--gold-light); }
    .card-sub { font-size: 0.82rem; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.5; }
    .card.checkin:hover  { box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(46,204,113,0.25); border-color: var(--success); }
    .card.checkout:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(231,76,60,0.25); border-color: var(--danger); }

    /* STATUS */
    #status {
      width: 100%;
      max-width: 500px;
      padding: 14px 20px;
      border-radius: 50px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      display: none;
      animation: fadeIn .4s ease;
    }
    #status.info    { background: rgba(52,152,219,0.25); color: #74b9ff; border: 1px solid rgba(52,152,219,0.4); display:block; }
    #status.success { background: rgba(46,204,113,0.2);  color: #55efc4; border: 1px solid rgba(46,204,113,0.4); display:block; }
    #status.error   { background: rgba(231,76,60,0.2);   color: #ff7675; border: 1px solid rgba(231,76,60,0.4); display:block; }

    /* GO BUTTON — يظهر بعد التحقق بدل النافذة المنبثقة */
    #go-btn {
      display: none;
      padding: 16px 20px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #000;
      font-family: 'Tajawal', sans-serif;
      font-weight: 150;
      font-size: 1.15rem;
      cursor: pointer;
      animation: pulse 1.5s infinite, fadeIn .4s ease;
      box-shadow: 0 8px 32px rgba(201,168,76,0.4);
    }
    #go-btn:hover { opacity: .9; transform: scale(1.04); }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    #distance-info {
      color: rgba(255,255,255,0.4);
      font-size: 0.78rem;
      text-align: center;
      min-height: 18px;
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse  { 0%,100% { box-shadow: 0 8px 32px rgba(201,168,76,0.4); } 50% { box-shadow: 0 8px 48px rgba(201,168,76,0.7); } }
  </style>
</head>
<body>
<div id="bg"></div>

<div class="wrapper">
  <div class="header">
    <h1>نظام الحضور والانصراف</h1>
    <div id="clock"></div>
  </div>

  <div class="cards">
    <div class="card checkin" id="card-checkin" onclick="handleAttendance('checkin')">
      <div class="card-icon">✅</div>
      <div class="card-title">تسجيل الحضور</div>
      <div class="card-sub">اضغط للتحقق من موقعك<br/>والانتقال لنموذج الحضور</div>
    </div>
    <div class="card checkout" id="card-checkout" onclick="handleAttendance('checkout')">
      <div class="card-icon">🚪</div>
      <div class="card-title">تسجيل الانصراف</div>
      <div class="card-sub">اضغط للتحقق من موقعك<br/>والانتقال لنموذج الانصراف</div>
    </div>
  </div>

  <div id="status"></div>
  <button id="go-btn" onclick="goToForm()">🔗 اضغط هنا للانتقال للنموذج</button>
  <div id="distance-info"></div>
</div>

<script>
  // ============================================================
  //  الإعدادات الثابتة — لا تظهر للمستخدم
  // ============================================================
  const CONFIG = {
    lat:        21.41619632962374,
    lng:        39.88574198075799,
    radius:     1500,   // ← غيّر النطاق هنا بالمتر
    checkinUrl:  'https://forms.gle/wC3dN7oArxg4dSdH6',
    checkoutUrl: 'https://forms.gle/L8kwwMM4dWdTNzpn7',
  };
  // ============================================================

  let pendingUrl = null;

  // ===== ساعة =====
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) +
      '  |  ' + new Date().toLocaleTimeString('ar-SA');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ===== قفل الجهاز اليومي =====
  function todayKey(type) {
    return 'att_' + type + '_' + new Date().toISOString().slice(0, 10);
  }
  function isAlreadyDone(type) {
    return !!localStorage.getItem(todayKey(type));
  }
  function markDone(type) {
    localStorage.setItem(todayKey(type), '1');
  }


  // ===== Haversine =====
  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    el.innerHTML = msg;
  }

  function goToForm() {
    if (pendingUrl) window.location.href = pendingUrl;
  }


    document.getElementById('go-btn').style.display = 'none';
    pendingUrl = null;
    setStatus('info', `<span class="spinner"></span> جارٍ تحديد موقعك…`);
    document.getElementById('distance-info').textContent = '';

    if (!navigator.geolocation) {
      setStatus('error', '❌ المتصفح لا يدعم خاصية تحديد الموقع');
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude, accuracy } = pos.coords;
        const dist = Math.round(getDistance(latitude, longitude, CONFIG.lat, CONFIG.lng));
        document.getElementById('distance-info').textContent =
          `📍 أنت على بُعد ${dist} متر من الموقع (دقة GPS: ±${Math.round(accuracy)} م)`;

        if (dist <= CONFIG.radius) {
          // حفظ قفل الجهاز
          markDone(type);
          applyDeviceLock();

          pendingUrl = type === 'checkin' ? CONFIG.checkinUrl : CONFIG.checkoutUrl;
          setStatus('success', type === 'checkin'
            ? '✅ تم التحقق من موقعك! اضغط الزر للانتقال لنموذج الحضور'
            : '✅ تم التحقق من موقعك! اضغط الزر للانتقال لنموذج الانصراف');

          // إظهار زر الانتقال بدل النافذة المنبثقة
          document.getElementById('go-btn').style.display = 'inline-block';
        } else {
          setStatus('error', `❌ أنت خارج النطاق المسموح به (${CONFIG.radius} م). مسافتك الحالية: ${dist} م`);
        }
      },
      err => {
        const msgs = {
          1: 'رفضت إذن الموقع. يرجى السماح من إعدادات المتصفح.',
          2: 'تعذّر تحديد الموقع. تأكد من تفعيل GPS.',
          3: 'انتهت مهلة تحديد الموقع. حاول مجدداً.',
        };
        setStatus('error', '❌ ' + (msgs[err.code] || 'خطأ غير متوقع'));
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }
</script>
</body>
</html>
