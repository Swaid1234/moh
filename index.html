<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور والانصراف الذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            transition: background 0.3s ease;
            font-weight: bold;
        }
        .btn-attendance {
            background-color: #2ecc71;
        }
        .btn-attendance:hover {
            background-color: #27ae60;
        }
        .btn-departure {
            background-color: #e67e22;
        }
        .btn-departure:hover {
            background-color: #d35400;
        }
        #status-message {
            margin-top: 20px;
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
        }
        .loading {
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>بوابة الحضور والانصراف</h2>
    <p>تأكد من تفعيل الـ GPS ثم اختر الإجراء المطلوب:</p>
    
    <div class="btn-group">
        <button class="btn btn-attendance" onclick="verifyLocation('attendance')">تسجيل حضور</button>
        <button class="btn btn-departure" onclick="verifyLocation('departure')">تسجيل انصراف</button>
    </div>
    
    <div id="status-message"></div>
</div>

<script>
    // ========================================================
    // إعدادات المواقع اليدوية (قم بتعديل الإحداثيات هنا)
    // ========================================================
   const LOCATIONS = [
        { name: "الموقع الأول (الرئيسي)", lat: 21.41619632962374, lng: 39.88574198075799 }, // استبدل بالإحداثيات المعتمدة
        { name: "الموقع الثاني (الفرع)", lat: 21.338251, lng: 39.994099 }   // استبدل بالإحداثيات المعتمدة
   

    const ALLOWED_RADIUS = 2500; // المسافة المسموحة بالمتر لكل موقع

    // روابط قوقل فورم (ضع رابط الحضور ورابط الانصراف هنا)
    const ATTENDANCE_FORM_URL = "https://forms.gle/6pUtD5bcLRYJV18Z8";
    const DEPARTURE_FORM_URL = "https://forms.gle/Hn2ysDaE5TP6pwn17";
    // ========================================================

    const statusDiv = document.getElementById('status-message');
    let currentAction = ''; // لتحديد هل تم ضغط حضور أم انصراف

    function verifyLocation(action) {
        currentAction = action; // حفظ نوع العملية الحالية

        if (!navigator.geolocation) {
            statusDiv.innerHTML = "متصفحك لا يدعم خاصية تحديد الموقع الجغرافي.";
            return;
        }

        statusDiv.className = "loading";
        statusDiv.innerHTML = "جاري التحقق من موقعك الحالي... يرجى الانتظار.";

        navigator.geolocation.getCurrentPosition(successCallback, errorCallback, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    }

    function successCallback(position) {
        const userLat = position.coords.latitude;
        const userLng = position.coords.longitude;

        let insideAnyLocation = false;
        let detectedLocationName = "";

        // فحص المسافة مع كل المواقع المحددة
        for (let loc of LOCATIONS) {
            const distance = calculateDistance(userLat, userLng, loc.lat, loc.lng);
            
            if (distance <= ALLOWED_RADIUS) {
                insideAnyLocation = true;
                detectedLocationName = loc.name;
                break; 
            }
        }

        if (insideAnyLocation) {
            statusDiv.style.color = "#27ae60";
            statusDiv.innerHTML = `تم التحقق بنجاح في [${detectedLocationName}]! جاري التوجيه...`;
            
            // التوجيه بناءً على الزر المضغوط (حضور أو انصراف)
            if (currentAction === 'attendance') {
                window.location.href = ATTENDANCE_FORM_URL;
            } else if (currentAction === 'departure') {
                window.location.href = DEPARTURE_FORM_URL;
            }
        } else {
            statusDiv.style.color = "#e74c3c";
            statusDiv.innerHTML = "عذراً، أنت خارج نطاق جميع مواقع العمل المعتمدة لا يمكنك التسجيل.";
        }
    }

    function errorCallback(error) {
        statusDiv.style.color = "#e74c3c";
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusDiv.innerHTML = "يجب عليك السماح للموقع بالوصول إلى الـ GPS لإتمام العملية.";
                break;
            case error.POSITION_UNAVAILABLE:
                statusDiv.innerHTML = "معلومات الموقع غير متوفرة حالياً.";
                break;
            case error.TIMEOUT:
                statusDiv.innerHTML = "انتهت مهلة طلب تحديد الموقع.";
                break;
            default:
                statusDiv.innerHTML = "حدث خطأ غير معروف.";
                break;
        }
    }

    // دالة حساب المسافة بالمتر (Haversine Formula)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c; 
    }
</script>

</body>
</html>
