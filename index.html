<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام الحضور والانصراف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --card-bg: rgba(10, 10, 10, 0.75);
      --success: #2ecc71;
      --danger: #e74c3c;
      --radius: 18px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
      position: relative;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-image: url('YOUR_BACKGROUND_IMAGE.jpg'); /* ← ضع رابط صورتك هنا */
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .header { text-align: center; }
    .header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(201,168,76,0.5);
    }
    #clock {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .cards {
      display: flex;
      gap: 20px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      flex: 1 1 240px;
      max-width: 300px;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: transform .28s, box-shadow .28s, border-color .28s;
      user-select: none;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.12), transparent 70%);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--gold);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(201,168,76,0.2);
    }
    .card:active { transform: scale(0.97); }
    .card-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
    .card-title { font-size: 1.35rem; font-weight: 700; color: var(--gold-light); }
    .card-sub { font-size: 0.82rem; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.5; }

    .card.checkin:hover  { box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(46,204,113,0.25); border-color: var(--success); }
    .card.checkout:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(231,76,60,0.25); border-color: var(--danger); }
  </style>
</head>
<body>
<div id="bg"></div>

<div class="wrapper">
  <div class="header">
    <h1>نظام الحضور والانصراف</h1>
    <div id="clock"></div>
  </div>

  <div class="cards">
    <a class="card checkin" href="https://forms.gle/NoEXqypNxk2Jjt8a8" target="_self">
      <div class="card-icon">✅</div>
      <div class="card-title">تسجيل الحضور</div>
      <div class="card-sub">اضغط للانتقال لنموذج الحضور</div>
    </a>
    <a class="card checkout" href="https://forms.gle/5e6T1AtHJ6yM3Dp48" target="_self">
      <div class="card-icon">🚪</div>
      <div class="card-title">تسجيل الانصراف</div>
      <div class="card-sub">اضغط للانتقال لنموذج الانصراف</div>
    </a>
  </div>
</div>

<script>

  const URLS = {
    checkin:  'https://forms.gle/ykv99FbvJip7Fhp99',
    checkout: 'https://forms.gle/FsHitkRbXJizgbZJ8',
  };

    ['checkin','checkout'].forEach(type => {

      const sub   = document.getElementById('sub-' + type);
      const timeEl= document.getElementById('time-' + type);
      const t     = TIMES[type];

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) +
      '  |  ' + new Date().toLocaleTimeString('ar-SA');
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
