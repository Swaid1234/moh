<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الحضور والانصراف الذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background-color: #27ae60;
        }
        #status-message {
            margin-top: 20px;
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
        }
        .loading {
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل الحضور والانصراف</h2>
    <p>يرجى الضغط على الزر أدناه للتحقق من موقعك وتسجيل الحضور.</p>
    <button class="btn" onclick="verifyLocation()">التحقق من الموقع والتسجيل</button>
    <div id="status-message"></div>
</div>

<script>
    // ========================================================
    // إعدادات الإحداثيات اليدوية (قم بتعديلها بما يناسب موقعك)
    // ========================================================
    const TARGET_LAT =21.41619632962374; // اكتب خط العرض هنا (مثال: إحداثيات مكة)
    const TARGET_LNG = 39.88574198075799; // اكتب خط الطول هنا
    const ALLOWED_RADIUS =1000; // المسافة المسموحة بالمتر (مثلاً في محيط 100 متر من الموقع)
    const GOOGLE_FORM_URL = "https://forms.gle/6pUtD5bcLRYJV18Z8"; // ضع رابط قوقل فورم هنا
    // ========================================================

    const statusDiv = document.getElementById('status-message');

    function verifyLocation() {
        if (!navigator.geolocation) {
            statusDiv.innerHTML = "متصفحك لا يدعم خاصية تحديد الموقع الجغرافي.";
            return;
        }

        statusDiv.className = "loading";
        statusDiv.innerHTML = "جاري تحديد موقعك الحالي... يرجى الانتظار.";

        navigator.geolocation.getCurrentPosition(successCallback, errorCallback, {
            enableHighAccuracy: true, // طلب دقة عالية باستخدام الـ GPS
            timeout: 10000,
            maximumAge: 0
        });
    }

    function successCallback(position) {
        const userLat = position.coords.latitude;
        const userLng = position.coords.longitude;

        // حساب المسافة بين المستخدم والموقع المحدد باستخدام صيغة Haversine
        const distance = calculateDistance(userLat, userLng, TARGET_LAT, TARGET_LNG);

        if (distance <= ALLOWED_RADIUS) {
            statusDiv.style.color = "#27ae60";
            statusDiv.innerHTML = "تم التحقق بنجاح! جاري التوجيه...";
            
            // التوجيه المباشر في نفس الصفحة بدون نوافذ منبثقة
            window.location.href = GOOGLE_FORM_URL;
        } else {
            statusDiv.style.color = "#e74c3c";
            statusDiv.innerHTML = `عذراً، أنت خارج نطاق العمل المسموح به. المسافة الحالية: ${Math.round(distance)} متر.`;
        }
    }

    function errorCallback(error) {
        statusDiv.style.color = "#e74c3c";
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusDiv.innerHTML = "يجب عليك السماح للموقع بالوصول إلى نظام تحديد المواقع (GPS).";
                break;
            case error.POSITION_UNAVAILABLE:
                statusDiv.innerHTML = "معلومات الموقع غير متوفرة حالياً.";
                break;
            case error.TIMEOUT:
                statusDiv.innerHTML = "انتهت مهلة طلب تحديد الموقع.";
                break;
            default:
                statusDiv.innerHTML = "حدث خطأ غير معروف أثناء تحديد الموقع.";
                break;
        }
    }

    // دالة رياضية لحساب المسافة بالمتر بين نقطتين على الكرة الأرضية
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // نصف قطر الأرض بالمتر
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c; // المسافة بالمتر
    }
</script>

</body>
</html>
