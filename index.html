<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور والانصراف - المشاعر المقدسة</title>
    <style>
        /* إعدادات الخلفية العامة المتوافقة مع الوضع الداكن */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ضع رابط صورتك الخلفية هنا بدلاً من الرابط التجريبي بالأسفل */
            background-image: url('https://haj.gov.sa/_next/image?url=https%3A%2F%2Fhaj.gov.sa%2Fs-core%2F-%2Fmedia%2FProject%2FHAJJ%2FIMAGES%2FHAJJ-Season%2F33.png%3Fh%3D1964%26iar%3D0%26w%3D5760%26hash%3D38E198558D91D8FE53D5DE53EA558C8B&w=3840&q=75'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: #0b0c10; /* لون احتياطي داكن جداً */
        }

        /* طبقة داكنة عميقة فوق الصورة لتعزيز الهوية البصرية للـ Dark Mode */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(10, 11, 14, 0.5) 0%, rgba(10, 11, 14, 0.85) 100%);
            z-index: 1;
        }

        /* حاوية التصميم الفاخرة بالوضع الداكن الزجاجي (Dark Glassmorphism) */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(20, 22, 26, 0.65); /* رمادي كربوني غامق وشبه شفاف */
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.07); /* حد ناعم جداً ومضيء */
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* التحكم في الصفحات والحركات */
        #page-1 { display: block; }
        #page-2 { display: none; }

        .fade-active {
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .btn-vertical, .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn-group {
            flex-direction: row;
        }

        /* الأزرار بالوضع الداكن الفخم والمستقبلي */
        .btn {
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            font-size: 17px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            top: 0;
        }

        /* تأثير التمرير واللمعان للأزرار (Hover) */
        .btn:hover {
            top: -4px;
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            top: -1px;
            transform: scale(0.99);
        }

        /* تدرجات داكنة مخصصة للمشاعر (عرفة ومنى) */
        .btn-arfa { 
            background: linear-gradient(135deg, #1f2833, #12161c); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-arfa:hover { 
            box-shadow: 0 10px 25px rgba(0, 180, 216, 0.25); 
            color: #00b4d8; /* توهج أزرق خفيف عند التمرير */
        }

        .btn-mina { 
            background: linear-gradient(135deg, #1f2833, #12161c); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-mina:hover { 
            box-shadow: 0 10px 25px rgba(114, 9, 183, 0.25); 
            color: #7209b7; /* توهج بنفسجي خفيف عند التمرير */
        }
        
        /* تدرجات حيوية وفخمة لأزرار الحضور والانصراف بالصفحة الثانية */
        .btn-attendance { 
            background: linear-gradient(135deg, #0f4c5c, #00b4d8); 
            flex: 1; 
        }
        .btn-attendance:hover { box-shadow: 0 10px 25px rgba(0, 180, 216, 0.4); }

        .btn-departure { 
            background: linear-gradient(135deg, #6f1d1b, #bb3e03); 
            flex: 1; 
        }
        .btn-departure:hover { box-shadow: 0 10px 25px rgba(187, 62, 3, 0.4); }

        /* ستايل زر الرجوع بالوضع الداكن */
        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            margin-top: 15px;
            padding: 12px;
            font-size: 14px;
            box-shadow: none;
            border-radius: 12px;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: none;
        }

        /* رسائل الحالة مع توهج النيون المناسب للوضع الداكن */
        #status-message {
            margin-top: 25px;
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            min-height: 24px;
            transition: all 0.3s ease;
        }
        
        .error-text { 
            color: #ff4d4d !important; 
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
            animation: shake 0.4s ease-in-out; 
        }
        
        .loading-text { 
            color: #00b4d8 !important; 
            text-shadow: 0 0 15px rgba(0, 180, 216, 0.4);
        }
        
        /* بادج أنيق للموقع النشط */
        .location-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            color: #00b4d8;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 600;
            border: 1px solid rgba(0, 180, 216, 0.3);
            text-shadow: 0 0 10px rgba(0, 180, 216, 0.2);
        }

        /* مفاتيح الحركات الرياضية */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ================= الصفحة الأولى: اختيار المشعر ================= -->
    <div id="page-1" class="fade-active">
        <h2>بوابة التحقق الجغرافي</h2>
        <p>مرحباً بك، يرجى اختيار مشعر تواجدك الحالي للتحقق من هويتك المكانية:</p>
        
        <div class="btn-vertical">
            <button class="btn btn-arfa" onclick="selectLocation(0)">مشعر عرفة</button>
            <button class="btn btn-mina" onclick="selectLocation(1)">مشعر منى</button>
        </div>
        <div id="status-message"></div>
    </div>

    <!-- ================= الصفحة الثانية: الحضور والانصراف ================= -->
    <div id="page-2">
        <h2>بوابة التحضير الرقمية</h2>
        <div id="active-location" class="location-badge"></div>
        <p>تم تأكيد موقعك بنجاح، اختر الإجراء المطلوب ليتم تسجيلك فوراً:</p>
        
        <div class="btn-group">
            <button class="btn btn-attendance" onclick="redirectToForm('attendance')">تسجيل حضور</button>
            <button class="btn btn-departure" onclick="redirectToForm('departure')">تسجيل انصراف</button>
        </div>

        <button class="btn btn-back" onclick="goBack()">رجوع للخلف</button>
    </div>

</div>

<script>
    // ========================================================
    // 1. إعدادات الإحداثيات اليدوية (عرفة ومنى)
    // ========================================================
    const LOCATIONS = [
        { name: "مشعر عرفة", lat: 21.338251, lng:39.994099 }, 
        { name: "مشعر منى", lat: 21.41619632962374, lng:39.88574198075799 }   
    ];

    const ALLOWED_RADIUS = 50000000; // النطاق المسموح بالمتر

    // ========================================================
    // 2. روابط قوقل فورم
    // ========================================================
    const ATTENDANCE_FORM_URL = "https://forms.gle/6pUtD5bcLRYJV18Z8";
    const DEPARTURE_FORM_URL = "https://forms.gle/Hn2ysDaE5TP6pwn17";
    // ========================================================

    const statusDiv = document.getElementById('status-message');
    const page1 = document.getElementById('page-1');
    const page2 = document.getElementById('page-2');
    const activeLocationBadge = document.getElementById('active-location');

    function selectLocation(index) {
        const targetLocation = LOCATIONS[index];

        if (!navigator.geolocation) {
            statusDiv.className = "error-text";
            statusDiv.innerHTML = "متصفحك لا يدعم نظام تحديد المواقع الجغرافية.";
            return;
        }

        statusDiv.className = "loading-text";
        statusDiv.innerHTML = `جاري مطابقة إحداثياتك مع [${targetLocation.name}]...`;

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                const distance = calculateDistance(userLat, userLng, targetLocation.lat, targetLocation.lng);

                if (distance <= ALLOWED_RADIUS) {
                    statusDiv.innerHTML = "";
                    
                    page1.style.display = "none";
                    page2.style.display = "block";
                    page2.classList.add("fade-active"); 
                    
                    activeLocationBadge.innerHTML = `الموقع الحالي المعتمد: ${targetLocation.name}`;
                } else {
                    statusDiv.className = "error-text";
                    statusDiv.innerHTML = `عذراً، أنت لست في النطاق الجغرافي لـ ${targetLocation.name}.`;
                }
            },
            function(error) {
                statusDiv.className = "error-text";
                if (error.code === error.PERMISSION_DENIED) {
                    statusDiv.innerHTML = "فضلاً، اسمح بالوصول للـ GPS لإتمام التحقق الرقمي.";
                } else {
                    statusDiv.innerHTML = "فشل التقاط الإحداثيات، تأكد من تشغيل الموقع بالهاتف.";
                }
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    function goBack() {
        page2.style.display = "none";
        page2.classList.remove("fade-active");
        
        page1.style.display = "block";
        page1.classList.add("fade-active");
        
        statusDiv.innerHTML = "";
        statusDiv.className = "";
    }

    function redirectToForm(action) {
        if (action === 'attendance') {
            window.location.replace(ATTENDANCE_FORM_URL);
        } else if (action === 'departure') {
            window.location.replace(DEPARTURE_FORM_URL);
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c; 
    }
</script>

</body>
</html>
