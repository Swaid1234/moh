<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور والانصراف - مشاعر مقدسة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        /* إعدادات صفحة الفحص الأولية */
        #checking-page {
            display: block; /* تظهر أولاً */
        }
        /* إعدادات صفحة الأزرار (مخفية في البداية) */
        #portal-page {
            display: none; 
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            transition: background 0.3s ease;
            font-weight: bold;
        }
        .btn-attendance {
            background-color: #2ecc71;
        }
        .btn-attendance:hover {
            background-color: #27ae60;
        }
        .btn-departure {
            background-color: #e67e22;
        }
        .btn-departure:hover {
            background-color: #d35400;
        }
        #status-message {
            margin-top: 20px;
            font-size: 16px;
            color: #3498db;
            font-weight: bold;
        }
        .error-text {
            color: #e74c3c !important;
        }
        .success-text {
            color: #27ae60 !important;
        }
        .location-badge {
            display: inline-block;
            background-color: #34495e;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- 1. صفحة الفحص التلقائي عند الدخول -->
    <div id="checking-page">
        <h2>بوابة التحقق من الموقع</h2>
        <p>جاري فحص تواجدك في النطاق الجغرافي لـ (عرفة / منى)...</p>
        <div id="status-message">الرجاء السماح بصلاحية الـ GPS إذا طُلبت منك...</div>
    </div>

    <!-- 2. صفحة الحضور والانصراف (تفتح فقط بعد نجاح الفحص) -->
    <div id="portal-page">
        <h2>أهلاً بك في نظام التحضير</h2>
        <div id="location-name" class="location-badge"></div>
        <p style="margin-top: 15px;">اضغط على الخيار المطلوب لتسجيل الحضور أو الانصراف فوراً:</p>
        
        <div class="btn-group">
            <button class="btn btn-attendance" onclick="redirectToForm('attendance')">تسجيل حضور</button>
            <button class="btn btn-departure" onclick="redirectToForm('departure')">تسجيل انصراف</button>
        </div>
    </div>

</div>

<script>
    // ========================================================
    // 1. إعدادات الإحداثيات اليدوية (إحداثيات عرفة ومحيط منى)
    // ========================================================
    const LOCATIONS = [
        { name: "مشعر عرفة", lat:  21.338251, lng:39.994099  }, // يمكنك تعديل الإحداثيات الدقيقة لمقرك هنا
        { name: "مشعر منى", lat: 21.41619632962374, lng:39.88574198075799 }   // يمكنك تعديل الإحداثيات الدقيقة لمقرك هنا
    ];

    const ALLOWED_RADIUS = 3000; // المسافة المسموحة بالمتر (مثلاً 500 متر لضمان تغطية جيدة في المشاعر)

    // ========================================================
    // 2. روابط قوقل فورم
    // ========================================================
    const ATTENDANCE_FORM_URL = "https://forms.gle/6pUtD5bcLRYJV18Z8";
    const DEPARTURE_FORM_URL = "https://forms.gle/Hn2ysDaE5TP6pwn17";
    // ========================================================

    const statusDiv = document.getElementById('status-message');
    const checkingPage = document.getElementById('checking-page');
    const portalPage = document.getElementById('portal-page');
    const locationBadge = document.getElementById('location-name');

    // تشغيل الفحص تلقائياً بمجرد فتح الصفحة
    window.onload = function() {
        startAutomaticCheck();
    };

    function startAutomaticCheck() {
        if (!navigator.geolocation) {
            statusDiv.className = "error-text";
            statusDiv.innerHTML = "متصفحك لا يدعم خاصية تحديد الموقع الجغرافي.";
            return;
        }

        // طلب الموقع تلقائياً وبأعلى دقة
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;
                let insideAnyLocation = false;
                let detectedLocationName = "";

                // مطابقة موقع الموظف مع عرفة أو منى
                for (let i = 0; i < LOCATIONS.length; i++) {
                    const distance = calculateDistance(userLat, userLng, LOCATIONS[i].lat, LOCATIONS[i].lng);
                    if (distance <= ALLOWED_RADIUS) {
                        insideAnyLocation = true;
                        detectedLocationName = LOCATIONS[i].name;
                        break; 
                    }
                }

                if (insideAnyLocation) {
                    // إذا كان بالموقع: اخفِ صفحة الفحص واظهر صفحة الحضور والانصراف فوراً
                    checkingPage.style.display = "none";
                    portalPage.style.display = "block";
                    locationBadge.innerHTML = `موقعك الحالي: ${detectedLocationName}`;
                } else {
                    // إذا كان خارج النطاق
                    statusDiv.className = "error-text";
                    statusDiv.innerHTML = "عذراً، أنت خارج النطاق الجغرافي المسموح به لـ (عرفة / منى). لا يمكنك التحضير.";
                }
            }, 
            function(error) {
                statusDiv.className = "error-text";
                if (error.code === error.PERMISSION_DENIED) {
                    statusDiv.innerHTML = "يجب إعطاء صلاحية الـ GPS للمتصفح لتتمكن المنظومة من التحقق والدخول.";
                } else {
                    statusDiv.innerHTML = "فشل تحديد موقعك، تأكد من تفعيل الـ GPS في جهازك وتحديث الصفحة.";
                }
            }, 
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    // دالة التوجيه الفوري عند ضغط زر حضور أو انصراف
    function redirectToForm(action) {
        if (action === 'attendance') {
            window.location.replace(ATTENDANCE_FORM_URL);
        } else if (action === 'departure') {
            window.location.replace(DEPARTURE_FORM_URL);
        }
    }

    // دالة حساب المسافة بالمتر (Haversine Formula)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c; 
    }
</script>

</body>
</html>
